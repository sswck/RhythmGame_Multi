<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RHYTHM MULTIPLAYER</title>
        <!-- 1. CSS 파일 연결 -->
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="shell">
            <main class="app">
                <header class="topbar">
                    <h1>RHYTHM MULTIPLAYER</h1>
                    <p class="subtitle">멀티플레이 리듬 게임</p>
                </header>

                <section class="hud" aria-label="게임 정보">
                    <div><span>BPM</span><strong id="bpm">128</strong></div>
                    <div><span>COMBO</span><strong id="combo">0</strong></div>
                    <div><span>SCORE</span><strong id="score">0</strong></div>
                    <div><span>ACCURACY</span><strong id="accuracy">100.00%</strong></div>
                    <div><span>LIFE</span><strong id="life">100</strong></div>
                </section>

                <section class="game-wrap">
                    <canvas id="stage" aria-label="리듬게임 스테이지"></canvas>
                </section>

                <section class="controls" aria-label="입력 버튼">
                    <button id="startBtn" class="start-btn">START</button>
                    <div class="key-guide" aria-label="입력 키 가이드">
                        <span id="keyA" class="key-cap">A</span>
                        <span id="keyS" class="key-cap">S</span>
                        <span id="keyD" class="key-cap">D</span>
                        <span id="keyF" class="key-cap">F</span>
                        <span id="keyG" class="key-cap">G</span>
                    </div>
                </section>

                <p id="message" class="message">START를 누르면 곡이 시작됩니다.</p>
            </main>
        </div>

        <!-- 2. JS 파일 연결 (순서 중요: 데이터가 로직보다 먼저 로드되어야 합니다) -->
        <script src="js/notes.js"></script>
        <script src="js/game.js"></script>
    </body>
</html>
